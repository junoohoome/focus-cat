name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run backend tests
        working-directory: src-tauri
        run: cargo test

  autofix:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request' && needs.test.result == 'failure'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Claude auto-fix failing tests
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: ""
          claude_args: "--max-turns 30"
          prompt: |
            CI 测试在本 PR 上失败了。请按下列步骤修：
            1. 跑 `npm test` 和 `cd src-tauri && cargo test`，拿到失败清单。
            2. 对每个失败做【最小】代码改动使其通过——不重构无关代码、不改测试断言去迎合 bug。
            3. 重跑测试验证全绿。
            4. 全绿后提交回当前分支，commit message 带 [claude-autofix] 标记。
            5. 若某项无法修复，或判断是测试本身有误，【不要硬改】——在 PR 留评论说明原因后停止。
